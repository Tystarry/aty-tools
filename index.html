<script>
var DATA=JSON.parse(document.getElementById('data-store').textContent.trim());
var fSw='all',fSub=null,modalItem=null;

function setFilt(sw,btn){
    fSw=sw;fSub=null;
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on')});
    if(btn)btn.classList.add('on');
    render();
}
function setSub(sw,sub,el){
    fSw=sw;fSub=sub;
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on')});
    document.querySelectorAll('.side a').forEach(function(b){b.classList.remove('on')});
    if(el)el.classList.add('on');
    render();
}
function getData(){
    var q=(document.getElementById('search').value||'').toLowerCase();
    return DATA.filter(function(d){
        if(fSw!=='all'&&d.software!==fSw)return false;
        if(fSub&&d.subtag!==fSub)return false;
        if(q){
            var s=(d.name||'')+' '+(d.description||'')+' '+JSON.stringify(d.files||[])+' '+(d.errorPatterns||[]).join(' ');
            if(s.toLowerCase().indexOf(q)===-1)return false;
        }
        return true;
    });
}
function he(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// 脚本内容从 window.__S 查找，避免 onclick 溢出
function copyById(id,btn){
    var txt=window.__S__[id]||'';
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){
        var orig=btn.textContent;
        btn.textContent='已复制!';btn.classList.add('done');
        setTimeout(function(){btn.textContent=orig;btn.classList.remove('done');},1500);
    });}
}
function copyPre(btn){
    var pre=btn.parentElement.querySelector('pre');
    var txt=pre?pre.textContent:'';
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){
        btn.textContent='已复制!';btn.classList.add('done');
        setTimeout(function(){btn.textContent='复制';btn.classList.remove('done');},1500);
    });}
}

function render(){
    var items=getData();
    var grp={};
    items.forEach(function(d){
        var k=d.software+' / '+d.subtag;
        if(!grp[k])grp[k]={sw:d.software,sub:d.subtag,n:0,ok:false,wip:false};
        grp[k].n++;
        if(d.category==='成功')grp[k].ok=true;
        if(d.category==='暂时没有')grp[k].wip=true;
    });
    var sh='<div class="sec">软件 / 子标签</div>';
    Object.keys(grp).sort().forEach(function(k){
        var g=grp[k],on=(fSw===g.sw&&fSub===g.sub)?' on':'';
        sh+='<a class="side-item'+on+'" data-sw="'+he(g.sw)+'" data-sub="'+he(g.sub)+'" onclick="setSub(this.dataset.sw,this.dataset.sub,this)">';
        sh+='<span class="dot '+(g.ok?'ok':'wip')+'"></span>'+he(k)+' ('+g.n+')</a>';
    });
    document.getElementById('side').innerHTML=sh;
    if(!items.length){
        document.getElementById('main').innerHTML='<div class="empty"><div class="big">📭</div><h3>没有匹配项</h3><p>试试调整搜索或筛选</p></div>';
        return;
    }
    var dg={};
    items.forEach(function(d){var k=d.software+' / '+d.subtag;if(!dg[k])dg[k]=[];dg[k].push(d);});
    var h='';
    Object.keys(dg).sort().forEach(function(k){
        var its=dg[k];
        h+='<div class="bar"><h2>'+he(k)+'</h2><div class="sub">'+its.length+' 个</div></div><div class="grid">';
        its.forEach(function(d){h+=card(d);});
        h+='</div>';
    });
    document.getElementById('main').innerHTML=h;
}

function card(d){
    var ok=d.category==='成功',cl=ok?'tag-ok':'tag-wip',tx=ok?'成功':'开发中';
    var fl=d.files||[],methods=d.methods||[],scripts=d.embeddedScripts||[];

    // 方法模块
    var mh='';
    if(methods.length>0){
        mh='<div class="methods-list">';
        methods.forEach(function(m,i){
            var pros='',cons='';
            if(m.pros&&m.pros.length)pros=m.pros.map(function(p){return'<span class="m-tag pro">👍 '+he(p)+'</span>';}).join('');
            if(m.cons&&m.cons.length)cons=m.cons.map(function(c){return'<span class="m-tag con">⚠ '+he(c)+'</span>';}).join('');
            var code=m.code||'';
            mh+='<div class="method-item" style="border-color:'+he(m.color||'#b8a99a')+'" onclick="event.stopPropagation();this.classList.toggle(\'open\')">'+
                '<div class="m-head">'+
                    '<div class="m-info">'+
                        '<div class="m-name">'+he(m.name)+' <span class="m-arrow">▶</span></div>'+
                        '<div class="m-tags">'+pros+cons+'</div>'+
                    '</div>'+
                    (code?'<button class="m-dl" onclick="event.stopPropagation();copyById(\''+he(d.name)+'|__method__|'+i+'\',this);return false" title="复制此方法脚本">📋</button>':'')+
                '</div>'+
                (code?'<div class="m-body"><div class="code-box"><button class="cbtn" onclick="event.stopPropagation();copyPre(this)">复制</button><pre>'+he(code)+'</pre></div></div>':'')+
            '</div>';
        });
        mh+='</div>';
    }

    var desc=d.description||'';
    if(!desc&&d.is_tracking&&d.tracking_detail)desc=d.tracking_detail['功能简述']||'';

    // 追踪信息
    var th='';

            '<span style="color:#e05555">🧊 <b>'+(s.not_frozen||0)+'</b> 未冻结</span>'+
            '<span style="color:#e05555">🏗 <b>'+(s.hierarchy_mismatch||0)+'</b> 层级不符</span>'+
            '<span style="color:var(--warn)">⚠ <b>'+s.mod_only+'</b> mod独有</span>'+

            data.pairs.forEach(function(p){
                var diff=Math.abs(p.mod_vtx-p.abc_vtx);
                var rowStyle=p.status==='mismatch'?'background:#e0555518':'';
                var nameStyle=p.status==='mismatch'?'color:#e05555;font-weight:600':'';
                var st=p.status==='ok'?'✅ 可连':(p.status==='mismatch'?'❌ 顶点不符':'⚠');
                var stColor=p.status==='mismatch'?'color:#e05555':'';
                var xf=p.mod_transform;
                var frozen=xf&&xf.frozen;
                var frozenTxt=frozen?'✅':'❌ 未冻结';
                var frozenStyle=!frozen?'color:#e05555;font-weight:600':'';
                if(!frozen&&xf){
                    var parts=[];
                    if(xf.t&&(xf.t[0]||xf.t[1]||xf.t[2]))parts.push('T('+xf.t.join(',')+')');
                    if(xf.r&&(xf.r[0]||xf.r[1]||xf.r[2]))parts.push('R('+xf.r.join(',')+')');
                    if(xf.s&&(xf.s[0]!==1||xf.s[1]!==1||xf.s[2]!==1))parts.push('S('+xf.s.join(',')+')');
                    frozenTxt='❌ '+parts.join(' ');
                }
                var hm=p.hierarchy_match!==false;
                var hierTxt=hm?'✅ 一致':'❌ mod:'+he(p.mod_hierarchy||'')+' / abc:'+he(p.abc_hierarchy||'');
                var hierStyle=!hm?'color:#e05555;font-weight:600':'';
                h+='<tr style="'+rowStyle+'"><td style="'+nameStyle+';padding:5px 10px">'+he(p.name)+'</td><td style="padding:5px 10px;text-align:right">'+p.mod_vtx+'</td><td style="padding:5px 10px;text-align:right">'+p.abc_vtx+'</td><td style="'+stColor+';padding:5px 10px">'+st+'</td><td style="padding:5px 10px;text-align:right;'+(diff>0?'color:#e05555;font-weight:600':'')+'">'+(diff>0?diff:'-')+'</td><td style="'+frozenStyle+';padding:5px 10px">'+frozenTxt+'</td><td style="'+hierStyle+';padding:5px 10px;font-size:11px">'+hierTxt+'</td></tr>';
            });
            h+='</tbody></table>';
        }
        if(data.mod_only&&data.mod_only.length)h+='<p style="margin-top:8px;color:var(--warn);font-size:12px">⚠ <b>mod独有</b>（ABC中不存在）: '+he(data.mod_only.join(', '))+'</p>';
        if(data.abc_only&&data.abc_only.length)h+='<p style="margin-top:4px;color:var(--warn);font-size:12px">⚠ <b>ABC独有</b>（mod中不存在）: '+he(data.abc_only.join(', '))+'</p>';
        h+='<button style="margin-top:10px;padding:6px 14px;background:var(--accent);color:#1a1d23;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin-right:8px" onclick="exportPDF()">📄 导出 PDF</button>';
        resultDiv.innerHTML=h;
    }catch(e){
        resultDiv.innerHTML='<p style="color:#e05555;font-size:12px">❌ JSON 解析失败: '+he(e.message)+'</p>';
    }
}

var BS_TEMPLATE='import maya.cmds as cmds,json,math\n'+
'mod="__MOD__";abc="__ABC__"\n'+
'def gms(g,d={}):\n'+
' s=cmds.listRelatives(g,shapes=True,type="mesh")or[]\n'+
' if s:d[g.split("|")[-1].split(":")[-1]]={"vtx":cmds.polyEvaluate(g,v=True),"path":g}\n'+
' for c in cmds.listRelatives(g,children=True,type="transform",fullPath=True)or[]:gms(c,d)\n'+
' return d\n'+
'def get_xf(n):t=cmds.getAttr(n+".t")[0];r=cmds.getAttr(n+".r")[0];s=cmds.getAttr(n+".s")[0];return{"t":[round(v,4)for v in t],"r":[round(v,4)for v in r],"s":[round(v,4)for v in s],"frozen":all(abs(v)<1e-6 for v in t)and all(abs(v)<1e-6 for v in r)and all(abs(v-1)<1e-6 for v in s)}\n'+
'def rel_path(p,root):parts=p.split("|");ri=0\n'+
' for i,pt in enumerate(parts):\n'+
'  if pt.split(":")[-1]==root.split("|")[-1].split(":")[-1]:ri=i;break\n'+
' return "|".join(parts[ri+1:])\n'+
'print("[ABC BS Diagnostic]");mr=gms("__MOD__");ar=gms("__ABC__")\n'+
'mod_root=cmds.ls("__MOD__",long=True)[0];abc_root=cmds.ls("__ABC__",long=True)[0]\n'+
'ans=set(mr.keys())|set(ar.keys());ps=[];mo=[];ao=[];ok=0;mm=0;nf=0;nh=0\n'+
'for n in sorted(ans):\n'+
' if n in mr and n in ar:\n'+
'  s="ok"if mr[n]["vtx"]==ar[n]["vtx"]else"mismatch"\n'+
'  if s=="ok":ok+=1\n'+
'  else:mm+=1\n'+
'  xf=get_xf(mr[n]["path"])\n'+
'  if not xf["frozen"]:nf+=1\n'+
'  mp=rel_path(mr[n]["path"],mod_root);ap=rel_path(ar[n]["path"],abc_root)\n'+
'  hm=mp==ap\n'+
'  if not hm:nh+=1\n'+
'  ps.append({"name":n,"mod_vtx":mr[n]["vtx"],"abc_vtx":ar[n]["vtx"],"status":s,"mod_transform":xf,"hierarchy_match":hm,"mod_hierarchy":mp,"abc_hierarchy":ap})\n'+
' elif n in mr:mo.append(n)\n'+
' else:ao.append(n)\n'+
'import datetime as dt\n'+
'r={"mod_group":mod,"abc_group":abc,"time":dt.datetime.now().strftime("%Y-%m-%d %H:%M:%S"),"summary":{"total_pairs":len(ps),"ok":ok,"mismatch":mm,"mod_only":len(mo),"abc_only":len(ao),"not_frozen":nf,"hierarchy_mismatch":nh},"pairs":ps,"mod_only":mo,"abc_only":ao}\n'+
'print("\\n=== COPY JSON BELOW ===\\n"+json.dumps(r,ensure_ascii=False,indent=2))';

<script>window.__S__={"aov-duplicate-alias-fix|fix_duplicate_aov_alias.py": "\"\"\"\nMaya Python Script - Clean up duplicate AOV alias on initialParticleSE\n\nUsage: paste into Maya Script Editor and run, or:\n         exec(open(r'd:\\\\zcy\\\\ai_ty\\\\fix_duplicate_aov_alias.py', encoding='utf-8').read())\n\"\"\"\n\nimport maya.cmds as cmds\n\n\ndef fix_duplicate_alias(sg, alias_name):\n    \"\"\"Remove duplicate alias using removeMultiInstance (same approach as MtoA removeAliases)\"\"\"\n    all_aliases = cmds.aliasAttr(sg, query=True) or []\n    print(\"Node {} has {} aliases\".format(sg, len(all_aliases)))\n\n    if alias_name not in all_aliases:\n        print(\"Alias '{}' not found on {}. Nothing to fix.\".format(alias_name, sg))\n        return\n\n    try:\n        cmds.removeMultiInstance(sg + '.' + alias_name)\n        print(\"Removed alias '{}' via removeMultiInstance.\".format(alias_name))\n    except Exception as e:\n        print(\"removeMultiInstance failed: {}\".format(e))\n        try:\n            cmds.aliasAttr(sg + '.' + alias_name, remove=True)\n            print(\"Removed alias via aliasAttr remove.\")\n        except Exception as e2:\n            print(\"aliasAttr remove also failed: {}\".format(e2))\n            return\n\n    remaining = cmds.aliasAttr(sg, query=True) or []\n    if alias_name in remaining:\n        print(\"WARNING: alias '{}' still exists on {}!\".format(alias_name, sg))\n    else:\n        print(\"Cleanup done. You can now re-add the AOV via AOV Editor.\")\n\n\nif __name__ == \"__main__\" or True:\n    fix_duplicate_alias(\"initialParticleSE\", \"ai_aov_crypto_asset\")\n", "aov-duplicate-alias-fix|fix_maya_aov_duplicate_alias.py": "\"\"\"\nMaya 脚本 — 修复 \"ai_aov_xxx is not a unique name. Cannot remove alias.\" 错误。\n\n问题原因：着色引擎 (shading engine, 如 initialParticleSE) 上某个 AOV 别名被重复创建，\n         MtoA 自带的 removeAliases 无法处理重复别名，导致崩溃。\n\n解决方式：\n  1. fix_duplicate_aliases() — 扫描所有着色引擎，用 removeMultiInstance 清理重复别名\n  2. patch_mtoa()           — 热修补 MtoA 的 removeAliases，防止日后再次出现同样错误\n  3. run()                  — 一键修复 + 打补丁\n\n使用方法（在出问题的 Maya 电脑上操作）：\n  方法A — 复制下方一行到 Maya Script Editor (Python 标签页)，回车运行：\n    exec(open(r'D:\\\\zcy\\\\ai_ty\\\\fix_maya_aov_duplicate_alias.py', encoding='utf-8').read())\n\n  方法B — 把本文件拷贝到 U 盘，在 Maya Script Editor 中执行：\n    exec(open(r'E:\\\\fix_maya_aov_duplicate_alias.py', encoding='utf-8').read())\n    （路径改成 U 盘实际路径）\n\n  方法C — Maya 菜单：File > Script Editor > File > Load Script，加载后 Ctrl+Enter 运行。\n\n  方法D — 命令行启动 Maya 时直接执行（无需打开 UI）：\n    mayapy.exe fix_maya_aov_duplicate_alias.py scene.ma\n\n如果需要每次打开 Maya 自动生效，把以下两行加到 userSetup.py：\n    import sys; sys.path.append(r'D:\\zcy\\ai_ty')\n    import fix_maya_aov_duplicate_alias; fix_maya_aov_duplicate_alias.patch_mtoa()\n\"\"\"\n\nimport maya.cmds as cmds\n\n\n# ============================================================================\n# 核心修复：清理所有着色引擎上的重复 AOV 别名\n# ============================================================================\n\ndef fix_duplicate_aliases(target_sg=None):\n    \"\"\"\n    扫描着色引擎，移除重复的 AOV 别名。\n\n    参数:\n        target_sg: 指定着色引擎名称，如 \"initialParticleSE\"。\n                   为 None 则扫描全部着色引擎。\n    返回:\n        修复成功的着色引擎数量。\n    \"\"\"\n    shading_engines = cmds.ls(type='shadingEngine')\n    if not shading_engines:\n        print(\"[fix_aov] 场景中没有着色引擎。\")\n        return 0\n\n    fixed_count = 0\n\n    for sg in shading_engines:\n        # 如果指定了目标着色引擎，只处理它\n        if target_sg and sg != target_sg:\n            continue\n\n        # 跳过参考节点（referenced nodes）\n        if cmds.referenceQuery(sg, isNodeReferenced=True):\n            continue\n\n        # 检查该节点上是否有 attributeAliasList\n        if not cmds.attributeQuery('attributeAliasList', node=sg, exists=True):\n            continue\n\n        all_aliases = cmds.aliasAttr(sg, query=True) or []\n        if not all_aliases:\n            continue\n\n        # 找出重复的别名（all_aliases 是 [aliasName1, plugName1, aliasName2, plugName2, ...]）\n        # 只检查 ai_aov_ 开头的别名\n        alias_names = all_aliases[0::2]  # 偶数下标是别名，奇数是插件名\n        aov_aliases = [a for a in alias_names if a.startswith('ai_aov_')]\n\n        # 统计各别名出现次数，找出重复项\n        from collections import Counter\n        dup_aliases = [a for a, cnt in Counter(aov_aliases).items() if cnt > 1]\n\n        if not dup_aliases:\n            continue\n\n        print(\"[fix_aov] {} 发现 {} 个重复 AOV 别名: {}\".format(\n            sg, len(dup_aliases), \", \".join(dup_aliases)))\n\n        for alias_name in dup_aliases:\n            # MtoA 使用 aliasAttr(remove=True) 删除重复别名会报：\n            #   \"xxx is not a unique name. Cannot remove alias.\"\n            # 解决方法：使用 removeMultiInstance，它能处理重复实例\n            attr_full = sg + '.' + alias_name\n\n            try:\n                cmds.removeMultiInstance(attr_full, b=True)\n                print(\"[fix_aov]   -> removeMultiInstance 移除 '{}' 成功\".format(alias_name))\n            except Exception as e1:\n                print(\"[fix_aov]   -> removeMultiInstance 失败: {}\".format(e1))\n                # 最后的兜底手段：删除并重建 attributeAliasList\n                try:\n                    alias_list_attr = sg + '.attributeAliasList'\n                    cmds.deleteAttr(alias_list_attr)\n                    print(\"[fix_aov]   -> 已删除 {} 整个 attributeAliasList 作为兜底\".format(alias_list_attr))\n                except Exception as e2:\n                    print(\"[fix_aov]   -> 兜底方案也失败: {}\".format(e2))\n\n        # 验证修复结果\n        remaining = cmds.aliasAttr(sg, query=True) or []\n        remaining_names = remaining[0::2]\n        still_dup = [a for a, cnt in Counter(remaining_names).items()\n                     if cnt > 1 and a.startswith('ai_aov_')]\n        if not still_dup:\n            fixed_count += 1\n            print(\"[fix_aov] {} 修复完成，所有重复别名已清理。\".format(sg))\n        else:\n            print(\"[fix_aov] {} WARNING: 仍有重复别名: {}\".format(sg, still_dup))\n\n    print(\"[fix_aov] 一共修复了 {} 个着色引擎。\".format(fixed_count))\n    return fixed_count\n\n\n# ============================================================================\n# 热修补：拦截 MtoA 的 removeAliases 函数，让它在内存里就被修正\n# ============================================================================\n\n_patched = False\n\n\ndef patch_mtoa():\n    \"\"\"\n    热修补 mtoa.aovs.removeAliases 函数。\n\n    把 MtoA 原版的 aliasAttr(remove=True) 替换为：\n      1. 先尝试 aliasAttr(remove=True)\n      2. 失败则用 removeMultiInstance\n      3. 再失败则跳过，不崩溃\n\n    这个补丁只在内存中生效，不需要管理员权限，重启 Maya 后失效。\n    如果需要永久生效，请加到 userSetup.py。\n\n    可以安全地多次调用（只生效一次）。\n    \"\"\"\n    global _patched\n    if _patched:\n        print(\"[fix_aov] MtoA 已经打过补丁，跳过。\")\n        return\n\n    try:\n        import mtoa.aovs as aovs\n\n        original_remove = aovs.removeAliases\n\n        def safe_removeAliases(sg):\n            \"\"\"包裹后的 removeAliases：用 removeMultiInstance 兜底\"\"\"\n            sg = str(sg)\n            if not sg or not cmds.objExists(sg):\n                return\n\n            if not cmds.attributeQuery('attributeAliasList', node=sg, exists=True):\n                return\n\n            all_aliases = cmds.aliasAttr(sg, query=True) or []\n            if not all_aliases:\n                return\n\n            for alias in all_aliases:\n                if not alias.startswith('ai_aov_'):\n                    continue\n\n                full_attr = sg + '.' + alias\n                try:\n                    cmds.aliasAttr(full_attr, remove=True)\n                except RuntimeError as e:\n                    # \"not a unique name\" 错误在这里被拦截\n                    print(\"[fix_aov] aliasAttr remove 失败({}), 改用 removeMultiInstance...\".format(alias))\n                    try:\n                        cmds.removeMultiInstance(full_attr, b=True)\n                        print(\"[fix_aov] removeMultiInstance 成功: {}\".format(full_attr))\n                    except Exception as e2:\n                        print(\"[fix_aov] removeMultiInstance 也失败({}), 跳过. 错误: {}\".format(alias, e2))\n\n        aovs.removeAliases = safe_removeAliases\n        _patched = True\n        print(\"[fix_aov] MtoA removeAliases 补丁已生效。\")\n\n    except ImportError:\n        print(\"[fix_aov] 无法 import mtoa.aovs，Arnold 插件是否已加载？\")\n    except Exception as e:\n        print(\"[fix_aov] 打补丁失败: {}\".format(e))\n\n\n# ============================================================================\n# 处理特定场景文件（命令行模式）\n# ============================================================================\n\ndef fix_scene_file(filepath, dry_run=False):\n    \"\"\"\n    直接修复 .ma/.mb 文件中的重复别名（文本替换方式）。\n\n    不通过 Maya，直接解析并修改 .ma 文本文件。\n    适用于场景打不开、Maya 闪退等无法进入 Maya 的情况。\n\n    参数:\n        filepath: .ma 文件的完整路径\n        dry_run:  True 则只检查不修改\n    \"\"\"\n    import re\n\n    if not filepath.lower().endswith('.ma'):\n        print(\"[fix_aov] 此模式仅支持 .ma (Maya ASCII) 文件。\")\n        print(\"[fix_aov] 请将场景另存为 .ma 格式后再试。\")\n        return\n\n    with open(filepath, 'r', encoding='utf-8', errors='replace') as f:\n        content = f.read()\n\n    # 匹配模式：initialParticleSE 节点中的重复 ai_aov_* 别名\n    # .ma 文件中别名以 \"attrAliasList\" 形式存储在一行或多行\n    # 具体格式类似：\n    #   setAttr \".attributeAliasList\" -type \"attributeAlias\" ...\n    # 或者\n    #   addAttr -ci true -sn \"ai_aov_xxx\" ...\n\n    # 统计匹配到的别名\n    alias_pattern = re.compile(r'ai_aov_\\w+')\n    matches = alias_pattern.findall(content)\n    from collections import Counter\n    dup_found = {a: c for a, c in Counter(matches).items() if c > 1}\n\n    if not dup_found:\n        print(\"[fix_aov] 场景文件中未发现重复的 AOV 别名。\")\n        return\n\n    print(\"[fix_aov] 场景文件中发现以下重复 AOV 别名:\")\n    for alias, count in dup_found.items():\n        print(\"  {} (出现 {} 次)\".format(alias, count))\n\n    if dry_run:\n        print(\"[fix_aov] dry-run 模式，未修改文件。\")\n        return\n\n    # 修复：对于 .ma 文件，重复别名通常出现在多个 createNode / addAttr 块中\n    # 由于 .ma 格式复杂，建议通过 Maya 打开后再用 fix_duplicate_aliases() 修复\n    print(\"[fix_aov] 文件级修复较复杂，建议在 Maya 中打开场景后运行 fix_duplicate_aliases()。\")\n    print(\"[fix_aov] 也可以尝试：打开场景 -> 忽略错误 -> Script Editor 中运行 exec(open(...)).\")\n\n\n# ============================================================================\n# 一键运行\n# ============================================================================\n\ndef run(target_sg=None):\n    \"\"\"\n    一键修复：先打补丁防止未来出错，再清理当前场景的重复别名。\n\n    参数:\n        target_sg: 指定着色引擎名称（如 \"initialParticleSE\"），None = 全部扫描\n    \"\"\"\n    print(\"=\" * 60)\n    print(\"Maya AOV 重复别名修复工具\")\n    print(\"=\" * 60)\n\n    # 第1步：先打补丁，防止 Mtoa 的 removeAliases 再次崩溃\n    patch_mtoa()\n\n    # 第2步：清理当前场景的重复别名\n    print(\"\")\n    fix_duplicate_aliases(target_sg=target_sg)\n\n    # 第3步：清理后重建 AOV 别名（Mtoa 在下次打开 AOV Editor 时会自动重建）\n    print(\"\")\n    print(\"[fix_aov] 完成。现在可以打开 AOV Editor 正常操作了。\")\n\n\n# ============================================================================\n# 入口：按 import / 直接 exec() / mayapy 三种方式自动适配\n# ============================================================================\n\nif __name__ == \"__main__\" or __name__ == \"__builtin__\":\n    # 直接运行 / exec() 方式：按需额外指定\n    run()\n", "aov-duplicate-alias-fix|fix_aov_crypto_asset.py": "\"\"\"\nMaya standalone script — fix \"Cannot add crypto_asset AOV\" error.\n\nWhat this does:\n  1. fix()     — cleans up duplicate AOV aliases in the current scene\n  2. patch()   — monkey-patches MtoA's addAliases/createAliases in memory so the\n                 same error won't happen again (no admin rights needed)\n\nUsage (in Maya Script Editor, Python tab):\n  =========================================\n\n  # One-liner (run this, then open AOV Editor):\n  exec(open(r'd:\\zcy\\ai_ty\\fix_aov_crypto_asset.py', encoding='utf-8').read())\n\n  # Or step-by-step:\n  import fix_aov_crypto_asset\n  fix_aov_crypto_asset.patch()            # prevent future crashes\n  fix_aov_crypto_asset.fix(\"crypto_asset\")  # clean up current scene\n  =========================================\n\nTo make it permanent (auto-run on Maya startup), add these lines to your\nMaya userSetup.py or a shelf button.\n\"\"\"\n\nimport maya.cmds as cmds\n\n\n# ---------------------------------------------------------------------------\n# Part 1: Scene cleanup — fix duplicate aliases on shading engines\n# ---------------------------------------------------------------------------\n\ndef fix(aov_name=\"crypto_asset\"):\n    \"\"\"\n    Remove duplicate 'ai_aov_<aov_name>' aliases from all local shading engines.\n\n    Call this BEFORE trying to add the AOV in the AOV Editor.\n    \"\"\"\n    alias_name = \"ai_aov_\" + aov_name\n    fixed_count = 0\n\n    shading_engines = cmds.ls(type='shadingEngine')\n    if not shading_engines:\n        print(\"[fix_aov] No shading engines found in scene.\")\n        return\n\n    print(\"[fix_aov] Scanning {} shading engines for alias '{}'...\".format(\n        len(shading_engines), alias_name))\n\n    for sg in shading_engines:\n        if cmds.referenceQuery(sg, isNodeReferenced=True):\n            continue\n\n        existing = cmds.aliasAttr(sg, query=True) or []\n        if alias_name not in existing:\n            continue\n\n        count = existing.count(alias_name)\n        print(\"[fix_aov]   {}: found '{}' x{} — cleaning...\".format(\n            sg, alias_name, count))\n\n        try:\n            cmds.removeMultiInstance(sg + '.' + alias_name)\n        except Exception:\n            try:\n                cmds.aliasAttr(sg + '.' + alias_name, remove=True)\n            except Exception:\n                pass\n\n        remaining = cmds.aliasAttr(sg, query=True) or []\n        if alias_name not in remaining:\n            fixed_count += 1\n            print(\"[fix_aov]     -> cleaned.\")\n        else:\n            print(\"[fix_aov]     -> WARNING: still present. Try restarting Maya.\")\n\n    if fixed_count:\n        print(\"[fix_aov] Done. Fixed {} shading engine(s).\".format(fixed_count))\n    else:\n        print(\"[fix_aov] No dirty aliases found. You should be able to add \"\n              \"'{}' now.\".format(aov_name))\n\n\n# ---------------------------------------------------------------------------\n# Part 2: MtoA runtime patch — prevent the error from happening again\n# ---------------------------------------------------------------------------\n\n_patched = False\n\n\ndef _build_safe_add_aliases(original_addAliases):\n    \"\"\"Wrap addAliases so aliasAttr(remove=True) failures fall back to\n       removeMultiInstance instead of crashing.\"\"\"\n    def safe_addAliases(aovs):\n        for sg in cmds.ls(type='shadingEngine'):\n            sgAttr = '{}.aiCustomAOVs'.format(sg)\n            # call the original getShadingGroupAOVMap from mtoa.aovs\n            from mtoa.aovs import getShadingGroupAOVMap\n            nameMapping, nextIndex = getShadingGroupAOVMap(sgAttr)\n            for aov in aovs:\n                try:\n                    plug = nameMapping[aov.name]\n                except KeyError:\n                    plug = '{}[{}].aovName'.format(sgAttr, nextIndex)\n                    cmds.setAttr(plug, aov.name, type=\"string\")\n                    nextIndex += 1\n\n                if cmds.referenceQuery(sg, isNodeReferenced=True):\n                    continue\n\n                aliasName = 'ai_aov_' + aov.name\n                try:\n                    cmds.aliasAttr(aliasName, plug)\n                except Exception:\n                    try:\n                        cmds.aliasAttr(sg + '.' + aliasName, remove=True)\n                    except Exception:\n                        try:\n                            cmds.removeMultiInstance(sg + '.' + aliasName)\n                        except Exception:\n                            pass\n                    try:\n                        cmds.aliasAttr(aliasName, plug)\n                    except Exception:\n                        pass\n    return safe_addAliases\n\n\ndef _build_safe_create_aliases(original_createAliases):\n    \"\"\"Wrap createAliases with the same removeMultiInstance fallback.\"\"\"\n    def safe_createAliases(sg):\n        sg = str(sg)\n        if sg == '' or not cmds.objExists(sg):\n            return\n        if sg == \"swatchShadingGroup\":\n            return\n\n        if cmds.attributeQuery('attributeAliasList', node=sg, exists=True):\n            alias_list = '{}.attributeAliasList'.format(sg)\n            if cmds.objExists(alias_list) and not cmds.aliasAttr(sg, q=True):\n                print(\"Shading Group %s with bad Attribute Alias list detected. Fixing!\" % sg)\n                cmds.deleteAttr(alias_list)\n\n        from mtoa.aovs import getAOVNodes, listAvailableIndices\n        aovList = getAOVNodes(True)\n        sgPlug = \"{}.aiCustomAOVs\".format(sg)\n\n        sgLogIdx = cmds.getAttr(sgPlug, mi=True) or []\n        s = set([cmds.getAttr(\"{}[{}].aovName\".format(sgPlug, i)) for i in sgLogIdx])\n        free = listAvailableIndices(sgLogIdx, len(aovList))\n        n = 0\n        for aov in aovList:\n            if aov[0] not in s:\n                cmds.setAttr(\"{}[{}].aovName\".format(sgPlug, free[n]), aov[0], typ=\"string\")\n                n += 1\n\n        if cmds.referenceQuery(sg, isNodeReferenced=True):\n            return\n\n        sgAttr = '{}.aiCustomAOVs'.format(sg)\n        attrValues = cmds.getAttr(sgAttr, mi=True) or []\n        for i in attrValues:\n            at = '{}[{}]'.format(sgAttr, i)\n            name = cmds.getAttr('{}.aovName'.format(at))\n            aliasName = 'ai_aov_' + name\n            try:\n                cmds.aliasAttr(aliasName, at)\n            except Exception:\n                try:\n                    cmds.aliasAttr(sg + '.' + aliasName, remove=True)\n                except Exception:\n                    try:\n                        cmds.removeMultiInstance(sg + '.' + aliasName)\n                    except Exception:\n                        pass\n                try:\n                    cmds.aliasAttr(aliasName, at)\n                except Exception:\n                    pass\n    return safe_createAliases\n\n\ndef patch():\n    \"\"\"\n    Monkey-patch mtoa.aovs.addAliases and mtoa.aovs.createAliases in memory.\n\n    This prevents the \"not a unique name\" crash when adding AOVs, without\n    needing to modify files in Program Files (no admin rights required).\n\n    Call once per Maya session, before opening the AOV Editor.\n    Safe to call multiple times.\n    \"\"\"\n    global _patched\n    if _patched:\n        print(\"[fix_aov] MtoA already patched in this session.\")\n        return\n\n    try:\n        import mtoa.aovs as aovs\n        aovs.addAliases = _build_safe_add_aliases(aovs.addAliases)\n        aovs.createAliases = _build_safe_create_aliases(aovs.createAliases)\n        _patched = True\n        print(\"[fix_aov] MtoA addAliases / createAliases patched in memory. \"\n              \"AOV Editor is now safe to use.\")\n    except ImportError:\n        print(\"[fix_aov] ERROR: Could not import mtoa.aovs — is Arnold \"\n              \"plugin loaded?\")\n    except Exception as e:\n        print(\"[fix_aov] ERROR: Failed to patch MtoA: {}\".format(e))\n\n\n# ---------------------------------------------------------------------------\n# Quickstart: auto-run when executed\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\" or True:\n    patch()\n    fix(\"crypto_asset\")\n", "aov-duplicate-alias-fix|__method__|0": "exec(open(r'D:\\zcy\\ai_ty\\fix_maya_aov_duplicate_alias.py', encoding='utf-8').read())", "aov-duplicate-alias-fix|__method__|1": "mayapy.exe fix_maya_aov_duplicate_alias.py scene.ma", "aov-duplicate-alias-fix|__method__|2": "import fix_maya_aov_duplicate_alias\nfix_maya_aov_duplicate_alias.patch_mtoa()", "aov-duplicate-alias-fix|__method__|3": "exec(open(r'D:\\zcy\\ai_ty\\fix_aov_crypto_asset.py', encoding='utf-8').read())", "bs-diagnostic|abc_blendshape_diagnostic.py": "\"\"\"\nMaya 脚本 — ABC 流程 blendShape 诊断工具\n\n场景：mod 模型需要接收 ABC 动画缓存的 blendShape，\n      当 BS 做不上时，用此脚本诊断对照问题。\n\n用法：\n  1. Maya Script Editor (Python) 中运行\n  2. 输入 mod 组名（如 Ahri_mod3）和 ABC 组名（如 CHR_Ahri）\n  3. 自动扫描比对，输出 JSON → 复制到仪表盘生成清单\n\n输出格式：\n  {\n    \"mod_group\": \"Ahri_mod3\",\n    \"abc_group\": \"CHR_Ahri\",\n    \"time\": \"2026-07-20 15:30:00\",\n    \"summary\": {\"total\":94, \"ok\":72, \"mismatch\":5, \"mod_only\":8, \"abc_only\":2},\n    \"pairs\": [\n      {\"name\":\"mesh_01_Geo\", \"mod_vtx\":1234, \"abc_vtx\":1234, \"status\":\"ok\"},\n      {\"name\":\"mesh_02_Geo\", \"mod_vtx\":1000, \"abc_vtx\":1200, \"status\":\"mismatch\"},\n      ...\n    ],\n    \"mod_only\": [\"xgen_hair_Geo\", ...],\n    \"abc_only\": [\"extra_mesh\", ...]\n  }\n\"\"\"\n\nimport maya.cmds as cmds\nimport json\nfrom datetime import datetime\nfrom collections import OrderedDict\n\n\ndef get_meshes_under(group):\n    \"\"\"\n    递归获取 group 下所有 mesh transform。\n    返回: {short_name: {full_path, vertex_count}}\n    \"\"\"\n    result = OrderedDict()\n    if not cmds.objExists(group):\n        return result\n\n    # 如果 group 本身是 mesh transform\n    shapes = cmds.listRelatives(group, shapes=True, type='mesh', fullPath=False) or []\n    if shapes:\n        sn = group.split('|')[-1].split(':')[-1]  # 去命名空间\n        vtx = cmds.polyEvaluate(group, vertex=True)\n        result[sn] = {'full_path': group, 'vtx': vtx}\n\n    # 递归子节点\n    children = cmds.listRelatives(group, children=True, type='transform', fullPath=True) or []\n    for child in children:\n        result.update(get_meshes_under(child))\n\n    return result\n\n\ndef strip_namespace(name):\n    \"\"\"去掉命名空间前缀，如 Ahri_mod3:mesh_Geo → mesh_Geo\"\"\"\n    return name.split(':')[-1]\n\n\ndef get_transform(node):\n    \"\"\"获取节点 transform 数据，检查是否冻结\"\"\"\n    t = cmds.getAttr(node + '.t')[0]\n    r = cmds.getAttr(node + '.r')[0]\n    s = cmds.getAttr(node + '.s')[0]\n    frozen = (all(abs(v) < 1e-6 for v in t) and\n              all(abs(v) < 1e-6 for v in r) and\n              all(abs(v - 1) < 1e-6 for v in s))\n    return {\n        't': [round(v, 4) for v in t],\n        'r': [round(v, 4) for v in r],\n        's': [round(v, 4) for v in s],\n        'frozen': frozen,\n    }\n\n\ndef relative_path(full_path, root_path):\n    \"\"\"提取节点相对于根组的层级路径\"\"\"\n    parts = full_path.split('|')\n    root_name = root_path.split('|')[-1].split(':')[-1]\n    root_idx = 0\n    for i, p in enumerate(parts):\n        if p.split(':')[-1] == root_name:\n            root_idx = i\n            break\n    return '|'.join(parts[root_idx + 1:])\n\n\ndef diagnose(mod_group, abc_group):\n    \"\"\"\n    诊断 mod 组和 ABC 组的 mesh 对照关系。\n\n    参数:\n        mod_group: mod 模型的组名/顶级节点\n        abc_group: ABC 缓存的组名/顶级节点\n\n    返回:\n        dict: 结构化诊断结果\n    \"\"\"\n    print(\"=\" * 60)\n    print(\"  ABC blendShape 诊断\")\n    print(\"=\" * 60)\n\n    # 1. 收集两边 mesh\n    print(f\"\\n[1/4] 扫描 mod 组: {mod_group}\")\n    mod_raw = get_meshes_under(mod_group)\n    if not mod_raw:\n        cmds.warning(f\"mod 组 '{mod_group}' 下未找到 mesh！\")\n        return None\n    print(f\"  找到 {len(mod_raw)} 个 mesh\")\n\n    print(f\"\\n[2/4] 扫描 ABC 组: {abc_group}\")\n    abc_raw = get_meshes_under(abc_group)\n    if not abc_raw:\n        cmds.warning(f\"ABC 组 '{abc_group}' 下未找到 mesh！\")\n        return None\n    print(f\"  找到 {len(abc_raw)} 个 mesh\")\n\n    # 2. 按短名去命名空间后匹配\n    print(f\"\\n[3/4] 匹配 mesh 配对...\")\n    mod_by_short = {strip_namespace(k): v for k, v in mod_raw.items()}\n    abc_by_short = {strip_namespace(k): v for k, v in abc_raw.items()}\n\n    all_names = set(mod_by_short.keys()) | set(abc_by_short.keys())\n\n    pairs = []\n    mod_only = []\n    abc_only = []\n    ok_count = 0\n    mismatch_count = 0\n    not_frozen_count = 0\n    hierarchy_mismatch_count = 0\n\n    # 获取根组全路径\n    mod_root = cmds.ls(mod_group, long=True)[0]\n    abc_root = cmds.ls(abc_group, long=True)[0]\n\n    for name in sorted(all_names):\n        in_mod = name in mod_by_short\n        in_abc = name in abc_by_short\n\n        if in_mod and in_abc:\n            mv = mod_by_short[name]['vtx']\n            av = abc_by_short[name]['vtx']\n            status = 'ok' if mv == av else 'mismatch'\n            if status == 'ok':\n                ok_count += 1\n            else:\n                mismatch_count += 1\n            # Transform 检查\n            xf = get_transform(mod_by_short[name]['full_path'])\n            if not xf['frozen']:\n                not_frozen_count += 1\n            # 层级对比\n            mp = relative_path(mod_by_short[name]['full_path'], mod_root)\n            ap = relative_path(abc_by_short[name]['full_path'], abc_root)\n            hm = mp == ap\n            if not hm:\n                hierarchy_mismatch_count += 1\n            pairs.append({\n                'name': name,\n                'mod_vtx': mv,\n                'abc_vtx': av,\n                'status': status,\n                'mod_transform': xf,\n                'hierarchy_match': hm,\n                'mod_hierarchy': mp,\n                'abc_hierarchy': ap,\n            })\n        elif in_mod:\n            mod_only.append(name)\n        else:\n            abc_only.append(name)\n\n    # 3. 汇总\n    total = len(pairs) + len(mod_only) + len(abc_only)\n    result = {\n        'mod_group': mod_group,\n        'abc_group': abc_group,\n        'time': datetime.now().strftime('%Y-%m-%d %H:%M:%S'),\n        'summary': {\n            'total_pairs': len(pairs),\n            'ok': ok_count,\n            'mismatch': mismatch_count,\n            'mod_only': len(mod_only),\n            'abc_only': len(abc_only),\n            'not_frozen': not_frozen_count,\n            'hierarchy_mismatch': hierarchy_mismatch_count,\n        },\n        'pairs': pairs,\n        'mod_only': mod_only,\n        'abc_only': abc_only,\n    }\n\n    # 4. 打印摘要\n    print(f\"\\n[4/4] 诊断完成\")\n    print(f\"  配对 mesh: {len(pairs)}\")\n    print(f\"    ✅ 顶点一致: {ok_count}\")\n    print(f\"    ❌ 顶点不匹配: {mismatch_count}\")\n    print(f\"    🧊 未冻结 Transform: {not_frozen_count}\")\n    print(f\"    🏗 层级不一致: {hierarchy_mismatch_count}\")\n    print(f\"  ⚠ mod 独有: {len(mod_only)}\")\n    print(f\"  ⚠ ABC 独有: {len(abc_only)}\")\n    if mod_only:\n        print(f\"\\n  mod 独有 mesh (ABC 中不存在):\")\n        for n in mod_only:\n            print(f\"    - {n}\")\n    if abc_only:\n        print(f\"\\n  ABC 独有 mesh (mod 中不存在):\")\n        for n in abc_only:\n            print(f\"    - {n}\")\n    if mismatch_count > 0:\n        print(f\"\\n  顶点不匹配的 mesh:\")\n        for p in pairs:\n            if p['status'] == 'mismatch':\n                print(f\"    ❌ {p['name']}: mod={p['mod_vtx']} vs abc={p['abc_vtx']} (差 {abs(p['mod_vtx']-p['abc_vtx'])})\")\n    if not_frozen_count > 0:\n        print(f\"\\n  Transform 未冻结的 mesh:\")\n        for p in pairs:\n            if not p.get('mod_transform', {}).get('frozen', True):\n                xf = p['mod_transform']\n                parts = []\n                if any(abs(v) > 1e-6 for v in xf['t']): parts.append(f\"T({xf['t'][0]},{xf['t'][1]},{xf['t'][2]})\")\n                if any(abs(v) > 1e-6 for v in xf['r']): parts.append(f\"R({xf['r'][0]},{xf['r'][1]},{xf['r'][2]})\")\n                if any(abs(v-1) > 1e-6 for v in xf['s']): parts.append(f\"S({xf['s'][0]},{xf['s'][1]},{xf['s'][2]})\")\n                print(f\"    🧊 {p['name']}: {' '.join(parts)}\")\n    if hierarchy_mismatch_count > 0:\n        print(f\"\\n  层级不一致的 mesh:\")\n        for p in pairs:\n            if not p.get('hierarchy_match', True):\n                print(f\"    🏗 {p['name']}: mod={p['mod_hierarchy']}  /  abc={p['abc_hierarchy']}\")\n\n    # 输出 JSON\n    json_str = json.dumps(result, ensure_ascii=False, indent=2)\n    print(f\"\\n{'=' * 60}\")\n    print(\"  📋 复制以下 JSON 到仪表盘生成清单\")\n    print(f\"{'=' * 60}\")\n    print(json_str)\n\n    return result\n\n\ndef run_dialog():\n    \"\"\"弹出输入对话框\"\"\"\n    result = cmds.promptDialog(\n        title='ABC blendShape 诊断',\n        message='输入 mod 组名:',\n        button=['下一步', '取消'],\n        defaultButton='下一步',\n        cancelButton='取消',\n        dismissString='取消',\n    )\n    if result == '取消':\n        return\n    mod_group = cmds.promptDialog(query=True, text=True)\n\n    result = cmds.promptDialog(\n        title='ABC blendShape 诊断',\n        message='输入 ABC 组名:',\n        button=['运行', '取消'],\n        defaultButton='运行',\n        cancelButton='取消',\n        dismissString='取消',\n    )\n    if result == '取消':\n        return\n    abc_group = cmds.promptDialog(query=True, text=True)\n\n    diagnose(mod_group, abc_group)\n\n\ndef run(mod_group=None, abc_group=None):\n    \"\"\"\n    运行诊断。如果未提供组名，弹出对话框。\n\n    用法:\n        import abc_blendshape_diagnostic as abd\n        abd.run(\"Ahri_mod3\", \"CHR_Ahri\")\n    \"\"\"\n    if mod_group and abc_group:\n        return diagnose(mod_group, abc_group)\n    else:\n        run_dialog()\n\n\nif __name__ == \"__main__\" or __name__ == \"__builtin__\":\n    run()\n", "bs-diagnostic|connect_blendshape_targets.mel": "// ============================================================\n// blendShape2 target 批量连接脚本\n// 场景: sjmg.ma\n// 目的: 将 CHR_Ahri (ABC动画) mesh 的 worldMesh 连接到\n//       blendShape2 的对应 target 输入\n//\n// 当前状态: 94个mesh只有前11个 (fashi_01-09, mao_01-02) 连了target\n//           还有 ~72 个需要连接\n// ============================================================\n\n// ---------- 第一步：诊断 ----------\nprint \"\\n========== 开始诊断 ==========\\n\";\n\n// 需要连接的配对表: {blendShape2 og索引, mod mesh短名, ABC mesh名}\n// og[11] = Ahri_mod3:mao_03 → ABC 里没有 mao_03！跟 mao_04 是不同mesh，跳过\n// og[21] = Ahri_mod3:head_Geo → ABC 里没有 head_Geo，跳过\n// og[68] = Ahri_mod3:hair_01_Geo → ABC 里没有 hair_01_Geo，跳过\n// og[89-93] = xgen 系列 → ABC 里没有，跳过\n\nstring $pairs_need_connect[][3] = {\n    // {bs2_index, mod_short_name, abc_full_name}\n    {\"12\", \"Ahri_mao_04_Geo\",           \"CHR_Ahri:Ahri_mao_04_Geo\"},\n    {\"13\", \"Ahri_mao_05_Geo\",           \"CHR_Ahri:Ahri_mao_05_Geo\"},\n    {\"14\", \"Ahri_eyelash_down_Geo\",     \"CHR_Ahri:Ahri_eyelash_down_Geo\"},\n    {\"15\", \"Ahri_eyelash_up_Geo\",       \"CHR_Ahri:Ahri_eyelash_up_Geo\"},\n    {\"16\", \"Ahri_eyebrow_Geo\",          \"CHR_Ahri:Ahri_eyebrow_Geo\"},\n    {\"17\", \"Ahri_cornea_R_Geo\",         \"CHR_Ahri:Ahri_cornea_R_Geo\"},\n    {\"18\", \"Ahri_cornea_L_Geo1\",       \"CHR_Ahri:Ahri_cornea_L_Geo1\"},\n    {\"19\", \"pasted__Ahri_eye_L_Geo\",   \"CHR_Ahri:pasted__Ahri_eye_L_Geo\"},\n    {\"20\", \"pasted__Ahri_eye_R_Geo\",   \"CHR_Ahri:pasted__Ahri_eye_R_Geo\"},\n    {\"22\", \"Ahri_body_Geo\",            \"CHR_Ahri:Ahri_body_Geo\"},\n    {\"23\", \"Ahri_zhijia_Geo\",          \"CHR_Ahri:Ahri_zhijia_Geo\"},\n    {\"24\", \"Ahri_teeth_01_Geo\",        \"CHR_Ahri:Ahri_teeth_01_Geo\"},\n    {\"25\", \"Ahri_teeth_02_Geo\",        \"CHR_Ahri:Ahri_teeth_02_Geo\"},\n    {\"26\", \"Ahri_teeth_03_Geo\",        \"CHR_Ahri:Ahri_teeth_03_Geo\"},\n    {\"27\", \"Ahri_teeth_04_Geo\",        \"CHR_Ahri:Ahri_teeth_04_Geo\"},\n    {\"28\", \"Ahri_teeth_05_Geo\",        \"CHR_Ahri:Ahri_teeth_05_Geo\"},\n    {\"29\", \"Ahri_leixian_01_Geo\",      \"CHR_Ahri:Ahri_leixian_01_Geo\"},\n    {\"30\", \"Ahri_leixian_02_Geo\",      \"CHR_Ahri:Ahri_leixian_02_Geo\"},\n    {\"31\", \"Ahri_zhuangshi_01_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_01_Geo\"},\n    {\"32\", \"Ahri_zhuangshi_02_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_02_Geo\"},\n    {\"33\", \"Ahri_zhuangshi_03_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_03_Geo\"},\n    {\"34\", \"Ahri_zhuangshi_17_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_17_Geo\"},\n    {\"35\", \"Ahri_zhuangshi_04_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_04_Geo\"},\n    {\"36\", \"Ahri_zhuangshi_05_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_05_Geo\"},\n    {\"37\", \"Ahri_zhuangshi_07_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_07_Geo\"},\n    {\"38\", \"Ahri_zhuangshi_08_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_08_Geo\"},\n    {\"39\", \"Ahri_zhuangshi_09_Geo\",    \"CHR_Ahri:Ahri_zhuangshi_09_Geo\"},\n    {\"40\", \"Ahri_zhuangshi_10_Geo\",    \"CHR_Ahri:Ahri_  \"CHR_Ahri:Ahri_shuijing_09_Geo\"},\n    {\"66\", \"Ahri_shuijing_10_Geo\",     \"CHR_Ahri:Ahri_shuijing_10_Geo\"},\n    {\"67\", \"Ahri_shuijing_11_Geo\",     \"CHR_Ahri:Ahri_shuijing_11_Geo\"},\n    {\"69\", \"Ahri_piaodai_01_Geo\",      \"CHR_Ahri:Ahri_piaodai_01_Geo\"},\n    {\"70\", \"Ahri_piaodai_02_Geo\",      \"CHR_Ahri:Ahri_piaodai_02_Geo\"},\n    {\"71\", \"Ahri_piaodai_03_Geo\",      \"CHR_Ahri:Ahri_piaodai_03_Geo\"},\n    {\"72\", \"Ahri_piaodai_04_Geo\",      \"CHR_Ahri:Ahri_piaodai_04_Geo\"},\n    {\"73\", \"Ahri_piaodai_05_Geo\",      \"CHR_Ahri:Ahri_piaodai_05_Geo\"},\n    {\"74\", \"Ahri_xiezi_01_Geo\",        \"CHR_Ahri:Ahri_xiezi_01_Geo\"},\n    {\"75\", \"Ahri_xiezi_02_Geo\",        \"CHR_Ahri:Ahri_xiezi_02_Geo\"},\n    {\"76\", \"Ahri_yifu_01_Geo\",         \"CHR_Ahri:Ahri_yifu_01_Geo\"},\n    {\"77\", \"Ahri_yifu_02_Geo\",         \"CHR_Ahri:Ahri_yifu_02_Geo\"},\n    {\"78\", \"Ahri_yifu_03_Geo\",         \"CHR_Ahri:Ahri_yifu_03_Geo\"},\n    {\"79\", \"Ahri_yifu_04_Geo\",         \"CHR_Ahri:Ahri_yifu_04_Geo\"},\n    {\"80\", \"Ahri_yifu_05_Geo\",         \"CHR_Ahri:Ahri_yifu_05_Geo\"},\n    {\"81\", \"Ahri_yifu_06_Geo\",         \"CHR_Ahri:Ahri_yifu_06_Geo\"},\n    {\"82\", \"Ahri_yifu_07_Geo\",         \"CHR_Ahri:Ahri_yifu_07_Geo\"},\n    {\"83\", \"Ahri_yifu_08_Geo\",         \"CHR_Ahri:Ahri_yifu_08_Geo\"},\n    {\"84\", \"Ahri_yifu_09_Geo\",         \"CHR_Ahri:Ahri_yifu_09_Geo\"},\n    {\"85\", \"Ahri_yifu_10_Geo\",         \"CHR_Ahri:Ahri_yifu_10_Geo\"},\n    {\"86\", \"Ahri_weiba_01_Geo\",        \"CHR_Ahri:Ahri_weiba_01_Geo\"},\n    {\"87\", \"Ahri_weiba_02_Geo\",        \"CHR_Ahri:Ahri_weiba_02_Geo\"},\n    {\"88\", \"pijian_growmesh\",          \"CHR_Ahri:pijian_growmesh\"}\n};\n\nint $total = size($pairs_need_connect);\nprint (\"需要连接的配对数量: \" + $total + \"\\n\");\n\n// ---------- 顶点数诊断 ----------\nstring $results_ok[];     // 顶点数一致\nstring $results_bad[];    // 顶点不同\nint $ok_count = 0;\nint $bad_count = 0;\n\nfor ($i = 0; $i < $total; $i++) {\n    string $mod_name = \"Ahri_mod3:\" + $pairs_need_connect[$i][1] + \"Shape\";\n    string $abc_name = $pairs_need_connect[$i][2] + \"Shape\";\n\n    if (!`objExists $mod_name`) {\n        print (\"  [跳过] mod mesh 不存在: \" + $mod_name + \"\\n\");\n        continue;\n    }\n    if (!`objExists $abc_name`) {\n        print (\"  [跳过] ABC mesh 不存在: \" + $abc_name + \"\\n\");\n        continue;\n    }\n\n    int $mod_vtx = `polyEvaluate -v $mod_name`;\n    int $abc_vtx = `polyEvaluate -v $abc_name`;\n\n    if ($mod_vtx == $abc_vtx) {\n        $results_ok[$ok_count] = $i;\n        $ok_count++;\n        print (\"  [OK]   \" + $pairs_need_connect[$i][1] + \" | mod=\" + $mod_vtx + \" abc=\" + $abc_vtx + \"\\n\");\n    } else {\n        $results_bad[$bad_count] = $i;\n        $bad_count++;\n        print (\"  [MIS]  \" + $pairs_need_connect[$i][1] + \" | mod=\" + $mod_vtx + \" abc=\" + $abc_vtx + \"\\n\");\n    }\n}\n\nprint \"\\n========== 诊断结果 ==========\\n\";\nprint (\"顶点一致可连接: \" + $ok_count + \" 个\\n\");\nprint (\"顶点数不同无法连接: \" + $bad_count + \" 个\\n\");\nprint (\"\\n无法连接的 mesh (顶点数不匹配):\\n\");\nfor ($i = 0; $i < $bad_count; $i++) {\n    int $idx = $results_bad[$i];\n    print (\"  - \" + $pairs_need_connect[$idx][1] + \"\\n\");\n}\n\nprint (\"\\nABC中没有对应mesh、无法做BS的:\\n\");\nprint (\"  - Ahri_mao_03_Geo (ABC只有mao_04/05, 无mao_03)\\n\");\nprint (\"  - Ahri_head_Geo (ABC里没有单独的head mesh)\\n\");\nprint (\"  - Ahri_hair_01_Geo (ABC里没有)\\n\");\nprint (\"  - Ahri_xgen_liuhai_Geo (xgen, ABC里没有)\\n\");\nprint (\"  - Ahri_xgen_cefa_Geo (xgen, ABC里没有)\\n\");\nprint (\"  - Ahri_xgen_head_Geo (xgen, ABC里没有)\\n\");\nprint (\"  - Ahri_xgen_meimao_Geo (xgen, ABC里没有)\\n\");\nprint (\"  - Ahri_xgen_jiemao_Geo (xgen, ABC里没有)\\n\");\n\n// ---------- 第二步：确认后连接 ----------\nprint \"\\n========== 开始连接 ==========\\n\";\n\n// 先扩展 blendShape2 的 it 数组到 94\nint $current_it_size = `getAttr -size \"blendShape2.it\"`;\nprint (\"当前 blendShape2.it 大小: \" + $current_it_size + \"\\n\");\n\n// 只连接顶点数匹配的\nint $connected = 0;\nint $failed = 0;\n\nfor ($i = 0; $i < $ok_count; $i++) {\n    int $pair_idx = $results_ok[$i];\n    string $bs2_idx = $pairs_need_connect[$pair_idx][0];\n    string $abc_name = $pairs_need_connect[$pair_idx][2] + \"Shape\";\n    string $target_attr = \"blendShape2.it[\" + $bs2_idx + \"].itg[0].iti[6000].igt\";\n\n    // 检查是否已经连接\n    string $existing[] = `listConnections -source true -destination false $target_attr`;\n    if (size($existing) > 0) {\n        print (\"  [跳过] \" + $pairs_need_connect[$pair_idx][1] + \" 已有连接: \" + $existing[0] + \"\\n\");\n        continue;\n    }\n\n    // 确保 it 元素存在\n    if (`attributeExists \"it\" \"blendShape2\"`) {\n        // 连接 target\n        string $cmd = \"connectAttr \\\"\" + $abc_name + \".w\\\" \\\"\" + $target_attr + \"\\\"\";\n        int $result = `eval $cmd`;\n        if ($result) {\n            $connected++;\n            print (\"  [连接] \" + $pairs_need_connect[$pair_idx][1] + \" ← \" + $abc_name + \"\\n\");\n        } else {\n            $failed++;\n            print (\"  [失败] \" + $pairs_need_connect[$pair_idx][1] + \"\\n\");\n        }\n    } else {\n        print (\"  [错误] blendShape2.it 属性不存在\\n\");\n    }\n}\n\nprint \"\\n========== 连接完成 ==========\\n\";\nprint (\"成功连接: \" + $connected + \" 个\\n\");\nprint (\"失败: \" + $failed + \" 个\\n\");\n\n// 验证\nstring $new_it_size = `getAttr -size \"blendShape2.it\"`;\nprint (\"blendShape2.it 最终大小: \" + $new_it_size + \"\\n\");\n\nprint \"\\n========== 后续步骤提醒 ==========\\n\";\nprint \"1. 检查变形顺序: 选中任意 Ahri_mod3 mesh → All Inputs → \\n\";\nprint \"   确保 blendShape2 在 AlembicNode 上方(如果有ABC连到mod)\\n\";\nprint \"2. 对于顶点数不匹配的mesh，需要手动处理:\\n\";\nprint \"   - 检查是否mod和ABC版本不同\\n\";\nprint \"   - 或使用 wrap deformer 代替 blendShape\\n\";\nprint \"3. 对于ABC中没有的mesh (mao_03, head, hair_01, xgen):\\n\";\nprint \"   - mao_03 可能需要手动对应到 mao_04(如果它们是同一mesh的不同版本)\\n\";\nprint \"   - head/hair_01/xgen 在ABC里没有源，需要另外处理\\n\";\nprint \"4. 设置 blendShape 权重: setAttr \\\"blendShape2.Geometry\\\" 1;\\n\";\nprint \"========================================\\n\";\n", "light-copy-and-rename|copy_light_group.py": "\"\"\"\nMaya 脚本 — 复制灯光组时，自动为组下所有子灯光递增命名。\n\n问题背景：\n  Maya 复制整个灯光组（group）时，组下的子灯光有时不会自动递增命名，\n  导致新复制的灯光与原始灯光重名，引发渲染层、AOV、灯光链接混乱。\n\n用法：\n  1. 在 Maya 视口或 Outliner 中选中要复制的灯光组/灯光\n  2. 在 Script Editor (Python 标签页) 中运行：\n        exec(open(r'D:\\\\zcy\\\\ai_ty\\\\copy_light_group.py', encoding='utf-8').read())\n  3. 脚本复制整个层级，并确保所有子灯光获得不重复的名称\n\n支持：\n  - Maya 原生灯光：ambientLight, directionalLight, pointLight, spotLight, areaLight, volumeLight\n  - Arnold 灯光：aiAreaLight, aiSkyDomeLight, aiLightPortal, aiPhotometricLight, aiMeshLight\n  - 深层嵌套组（组中组中组...中的灯光）\n  - 一次选中多个组同时复制\n\"\"\"\n\nimport maya.cmds as cmds\nimport re\n\n\n# ============================================================================\n# 工具函数\n# ============================================================================\n\ndef _is_light(node):\n    \"\"\"判断节点是否为灯光 transform（Maya原生 + Arnold + Redshift + V-Ray...）\"\"\"\n    if not cmds.objExists(node):\n        return False\n    shapes = cmds.listRelatives(node, shapes=True, fullPath=True) or []\n    for s in shapes:\n        if 'light' in cmds.nodeType(s).lower():\n            return True\n    return False\n\n\ndef _get_lights_under(root):\n    \"\"\"\n    递归获取 root 下所有灯光 transform 的全路径。\n    返回: [full_path, ...]\n    \"\"\"\n    result = []\n    if _is_light(root):\n        result.append(root)\n    children = cmds.listRelatives(root, children=True, type='transform', fullPath=True) or []\n    for child in children:\n        result.extend(_get_lights_under(child))\n    return result\n\n\ndef _short_name(full_path):\n    \"\"\"全路径 → 短名称\"\"\"\n    return full_path.split('|')[-1]\n\n\ndef _make_unique_name(name):\n    \"\"\"\n    确保名称在场景中唯一。\n    如果 name 已存在，自动递增数字后缀。\n    例：KeyLight → KeyLight1 → KeyLight2 ...\n    \"\"\"\n    if not cmds.objExists(name):\n        return name\n\n    m = re.match(r'^(.*?)(\\d*)$', name)\n    base = m.group(1)\n    suffix = m.group(2)\n\n    num = int(suffix) if suffix else 1\n    while cmds.objExists(f\"{base}{num}\"):\n        num += 1\n    return f\"{base}{num}\"\n\n\n# ============================================================================\n# 核心功能\n# ============================================================================\n\ndef copy_light_group():\n    \"\"\"\n    复制选中的灯光组，确保子灯光命名不重名。\n    \"\"\"\n    sel = cmds.ls(selection=True, type='transform')\n    if not sel:\n        cmds.warning(\"[copy_light] 请先选中要复制的灯光组或灯光！\")\n        return\n\n    results = []\n\n    for root in sel:\n        # 1. 记录原始灯光名称（短名），用于后续判断新灯光是否需要重命名\n        orig_lights = _get_lights_under(root)\n        orig_short_names = {_short_name(p) for p in orig_lights}\n        print(f\"[copy_light] 原始节点 '{_short_name(root)}' 下有 {len(orig_lights)} 个灯光\")\n\n        # 2. 执行复制\n        try:\n            new_nodes = cmds.duplicate(root, renameChildren=True)\n        except Exception as e:\n            cmds.warning(f\"[copy_light] 复制失败: {e}\")\n            continue\n\n        new_root = new_nodes[0]\n        print(f\"[copy_light] 新节点: '{_short_name(new_root)}'\")\n\n        # 3. 获取新组下的所有灯光（全路径）\n        new_lights = _get_lights_under(new_root)\n\n        # 4. 检查新灯光命名：如果短名称在原始灯光集合中，\n        #    说明 Maya 没有正确递增 → 手动重命名\n        renamed_count = 0\n        for full_path in new_lights:\n            sn = _short_name(full_path)\n            if sn in orig_short_names:\n                unique = _make_unique_name(sn)\n                try:\n                    actual = cmds.rename(full_path, unique)\n                    print(f\"[copy_light]   {sn} → {actual}\")\n                    renamed_count += 1\n                except Exception as e:\n                    cmds.warning(f\"[copy_light]   重命名 {full_path} 失败: {e}\")\n\n        if renamed_count == 0:\n            print(f\"[copy_light]   Maya 已自动递增，无需修复 ✓\")\n        else:\n            print(f\"[copy_light]   共修复 {renamed_count} 个灯光命名\")\n\n        results.append(new_root)\n\n    # 选中新创建的组\n    if results:\n        cmds.select(results)\n    print(f\"[copy_light] 完成！共复制 {len(results)} 个节点。\")\n    return results\n\n\n# ============================================================================\n# 入口\n# ============================================================================\n\nif __name__ == \"__main__\" or __name__ == \"__builtin__\":\n    copy_light_group()\n", "light-copy-and-rename|fix_duplicate_light_names.py": "\"\"\"\nMaya 脚本 — 查找场景中重复命名的灯光，并自动修改为递增命名。\n\n问题背景：\n  复制灯光组或手动创建灯光时，可能出现多个灯光同名的情况。\n  Maya 不会自动报错，但会导致渲染层、AOV、灯光链接等混乱。\n\n用法：\n  Maya Script Editor (Python 标签页) 中运行：\n    exec(open(r'D:\\\\zcy\\\\ai_ty\\\\fix_duplicate_light_names.py', encoding='utf-8').read())\n\n功能：\n  - check_only()  — 仅检查并报告重复命名的灯光（不修改）\n  - fix()          — 查找重复命名的灯光并自动重命名为递增序号\n  - run()          — 一键检查 + 修复（默认入口）\n\n重命名规则：\n  场景中有 3 个名为 \"SpotLight1\" 的灯光 →\n    SpotLight1  (保留第一个)\n    SpotLight2  (第二个，自动找下一个可用编号)\n    SpotLight3  (第三个)\n\"\"\"\n\nimport maya.cmds as cmds\nimport re\nfrom collections import Counter\n\n\n# ============================================================================\n# 工具函数\n# ============================================================================\n\ndef _is_light_transform(node):\n    \"\"\"判断节点是否为灯光（Maya原生 + Arnold + Redshift + V-Ray...）\"\"\"\n    if not cmds.objExists(node):\n        return False\n    shapes = cmds.listRelatives(node, shapes=True, fullPath=True) or []\n    for s in shapes:\n        if 'light' in cmds.nodeType(s).lower():\n            return True\n    return False\n\n\ndef _get_all_lights():\n    \"\"\"获取场景中所有灯光 transform（Maya原生 + Arnold + Redshift + V-Ray...）\"\"\"\n    lights = set()\n    # Maya 原生灯光\n    for l in (cmds.ls(lights=True, long=True) or []):\n        lights.add(l)\n    # 所有含 light/light 的 shape 类型（覆盖 Arnold/Redshift/V-Ray 等）\n    all_shapes = cmds.ls(type='shape', long=True) or []\n    for s in all_shapes:\n        node_type = cmds.nodeType(s)\n        if 'light' in node_type.lower():\n            parent = cmds.listRelatives(s, parent=True, fullPath=True)\n            if parent:\n                lights.add(parent[0])\n    return list(lights)\n\n\ndef _is_referenced(node_name):\n    \"\"\"判断节点是否来自参考（reference）文件\"\"\"\n    if not cmds.objExists(node_name):\n        return True  # 不存在的节点跳过\n    try:\n        return cmds.referenceQuery(node_name, isNodeReferenced=True)\n    except RuntimeError:\n        return False\n\n\ndef _make_unique_name(name):\n    \"\"\"\n    根据名称生成场景中唯一的递增名称。\n    例如：KeyLight → 如果 KeyLight 已存在 → KeyLight1, KeyLight2...\n    \"\"\"\n    if not cmds.objExists(name):\n        return name\n\n    m = re.match(r'^(.*?)(\\d*)$', name)\n    base = m.group(1)\n    suffix = m.group(2)\n\n    num = int(suffix) if suffix else 1\n    while cmds.objExists(f\"{base}{num}\"):\n        num += 1\n    return f\"{base}{num}\"\n\n\n# ============================================================================\n# 核心功能\n# ============================================================================\n\ndef check_only():\n    \"\"\"\n    仅检查场景中的重复灯光命名，不执行任何修改。\n    返回重复名称列表。\n    \"\"\"\n    all_lights = _get_all_lights()\n\n    # 按短名统计，过滤参考节点\n    name_counts = Counter()\n    for full_path in all_lights:\n        short_name = full_path.split('|')[-1]\n        if not _is_referenced(short_name):\n            name_counts[short_name] += 1\n    duplicates = {name: count for name, count in name_counts.items() if count > 1}\n\n    if not duplicates:\n        print(\"[fix_light_name] ✅ 场景中没有重复命名的灯光。\")\n        return []\n\n    print(\"[fix_light_name] ⚠ 发现以下重复命名的灯光：\")\n    print(f\"  {'灯光名':<30} {'出现次数':>8}\")\n    print(f\"  {'-'*30} {'-'*8}\")\n    for name, count in sorted(duplicates.items()):\n        print(f\"  {name:<30} {count:>8}\")\n\n    print(f\"\\n[fix_light_name] 共 {len(duplicates)} 个名称重复，涉及 {sum(duplicates.values())} 个灯光。\")\n    print(\"[fix_light_name] 运行 fix() 可自动修复。\")\n    return list(duplicates.keys())\n\n\ndef fix(dry_run=False):\n    \"\"\"\n    修复场景中重复命名的灯光。\n\n    对于每组重名灯光：\n      - 保留第一个（序号最小或最先出现）\n      - 其余重命名为同系列的下一个可用编号\n\n    参数:\n        dry_run: True = 仅预览将要执行的重命名（不修改场景）\n    \"\"\"\n    all_lights = _get_all_lights()\n    # 按短名称分组\n    from collections import defaultdict\n    name_groups = defaultdict(list)\n\n    for full_path in all_lights:\n        short_name = full_path.split('|')[-1]\n        # 跳过参考节点\n        if _is_referenced(short_name):\n            continue\n        name_groups[short_name].append(full_path)\n\n    # 筛选出有重复的\n    duplicates = {n: paths for n, paths in name_groups.items() if len(paths) > 1}\n\n    if not duplicates:\n        print(\"[fix_light_name] ✅ 场景中没有重复命名的灯光。\")\n        return 0\n\n    print(\"[fix_light_name] 开始修复重复灯光命名...\")\n    print(f\"[fix_light_name] 发现 {len(duplicates)} 组重名灯光\\n\")\n\n    fixed_count = 0\n\n    for short_name, paths in sorted(duplicates.items()):\n        print(f\"  重名组: '{short_name}' ({len(paths)} 个实例)\")\n\n        # 保留第一个，其余重命名\n        keep = paths[0]\n        to_rename = paths[1:]\n\n        print(f\"    保留: {keep}\")\n\n        for old_full in to_rename:\n            # 生成唯一名称\n            new_name = _make_unique_name(short_name)\n\n            if dry_run:\n                print(f\"    [预览] {old_full} → {new_name}\")\n            else:\n                try:\n                    actual = cmds.rename(old_full, new_name)\n                    print(f\"    已重命名: {old_full.split('|')[-1]} → {actual}\")\n                    fixed_count += 1\n                except Exception as e:\n                    cmds.warning(f\"[fix_light_name] 重命名失败: {old_full} → {new_name}, 错误: {e}\")\n\n        print()\n\n    if dry_run:\n        print(f\"[fix_light_name] [预览模式] 将重命名 {fixed_count} 个灯光（未实际修改）\")\n    else:\n        print(f\"[fix_light_name] ✅ 修复完成！共重命名 {fixed_count} 个灯光。\")\n\n    return fixed_count\n\n\n# ============================================================================\n# 一键运行\n# ============================================================================\n\ndef run():\n    \"\"\"\n    一键检查 + 修复：先展示重复灯光，再执行重命名。\n    \"\"\"\n    print(\"=\" * 60)\n    print(\"Maya 灯光重复命名检测与修复工具\")\n    print(\"=\" * 60)\n    print()\n\n    dup_list = check_only()\n    if not dup_list:\n        return\n\n    print()\n    answer = input(\"[fix_light_name] 是否修复以上重复命名？(y/n): \").strip().lower()\n    if answer == 'y':\n        fix()\n    else:\n        print(\"[fix_light_name] 已取消，未做任何修改。\")\n\n\n# ============================================================================\n# 入口\n# ============================================================================\n\nif __name__ == \"__main__\" or __name__ == \"__builtin__\":\n    # 直接运行时：先检查再修复\n    dup_list = check_only()\n    if dup_list:\n        print()\n        fix()\n", "light-copy-and-rename|__method__|0": "exec(open(r'D:\\zcy\\ai_ty\\copy_light_group.py', encoding='utf-8').read())", "light-copy-and-rename|__method__|1": "exec(open(r'D:\\zcy\\ai_ty\\fix_duplicate_light_names.py', encoding='utf-8').read())", "rig-cleaner-tools|scan_orphans.py": "#!/usr/bin/env python3\n\"\"\"\n深度扫描 Maya .ma 文件，找出所有可安全清理的垃圾节点。\n第二版：检测孤儿节点、纯 UI 节点、冗余历史节点。\n\"\"\"\n\nimport re\nimport os\nimport sys\nfrom collections import defaultdict\n\ndef scan_all_nodes(filepath):\n    \"\"\"扫描所有节点及其引用关系\"\"\"\n    nodes = {}  # name -> type\n    node_blocks = {}  # name -> list of lines (the createNode block)\n    referenced = set()  # nodes referenced in connectAttr\n    referencing = defaultdict(set)  # node -> set of nodes it connects to\n\n    create_node_re = re.compile(r'createNode\\s+(\\S+)\\s+-n\\s+\"([^\"]+)\"')\n    connect_attr_re = re.compile(r'connectAttr\\s+\"([^.]+)\\.([^\"]+)\"\\s+\"([^.]+)\\.([^\"]+)\"')\n\n    print(\"第一遍：扫描所有节点定义...\")\n    with open(filepath, 'r', encoding='utf-8', errors='replace') as f:\n        lines = f.readlines()\n\n    total = len(lines)\n    i = 0\n    while i < total:\n        line = lines[i]\n        if line.startswith('createNode '):\n            m = create_node_re.search(line)\n            if m:\n                node_type = m.group(1)\n                node_name = m.group(2)\n                nodes[node_name] = node_type\n        i += 1\n\n    print(f\"  找到 {len(nodes):,} 个节点\")\n\n    print(\"第二遍：扫描所有连接关系...\")\n    for line in lines:\n        if line.strip().startswith('connectAttr '):\n            m = connect_attr_re.search(line)\n            if m:\n                src_node = m.group(1)\n                dst_node = m.group(3)\n                referenced.add(src_node)\n                referenced.add(dst_node)\n                referencing[src_node].add(dst_node)\n\n    print(f\"  找到 {len(referenced):,} 个被引用的节点\")\n\n    # 孤儿节点：没有被任何 connectAttr 引用，也不引用其他节点\n    orphaned = {}\n    for name, ntype in nodes.items():\n        if name not in referenced:\n            orphaned[name] = ntype\n\n    return nodes, referenced, referencing, orphaned, lines\n\ndef is_safe_to_remove(node_name, node_type, nodes, referenced, referencing):\n    \"\"\"判断节点是否可以安全删除\"\"\"\n    # 排除系统关键节点\n    system_prefixes = [':', 'persp', 'top', 'front', 'side', 'default',\n                       'layerManager', 'renderLayerManager', 'renderPartition',\n                       'lightLinker', 'shapeEditorManager', 'poseInterpolatorManager',\n                       'defaultLayer', 'defaultRenderLayer', 'defaultLightSet',\n                       'defaultObjectSet', 'initialShadingGroup', 'initialParticleSE',\n                       'initialMaterialInfo', 'lambert1', 'particleCloud1',\n                       'standardSurface1']\n\n    if node_name.startswith(':'):\n        return False, \"系统节点\"\n    for prefix in system_prefixes:\n        if node_name == prefix or node_name.startswith(prefix):\n            return False, \"系统/默认节点\"\n\n    # nodeGraphEditorInfo 及其变种 - 已在前一轮删除\n    # 检查是否是 UI 相关节点\n    ui_patterns = ['hyperShadePrimary', 'hyperGraph', 'hyperLayout',\n                   'nodeEditorPanel', 'nodeGraphEditor']\n\n    for pat in ui_patterns:\n        if pat in node_name:\n            return True, \"UI编辑器数据\"\n\n    # 基于类型判断\n    safe_types = {\n        'polyBridgeEdge': '遗留构造历史',\n        'polyExtrudeFace': '遗留构造历史',\n        'polyExtrudeEdge': '遗留构造历史',\n        'polyBevel': '遗留构造历史',\n        'polySmoothFace': '遗留构造历史',\n        'polySplit': '遗留构造历史',\n        'polyTweak': '遗留构造历史',\n        'polyDelEdge': '遗留构造历史',\n        'polyCloseBorder': '遗留构造历史',\n        'polyMergeVert': '遗留构造历史',\n    }\n\n    if node_type in safe_types:\n        return True, safe_types[node_type]\n\n    # annotationShape - 视口标注，通常不需要\n    if node_type == 'annotationShape':\n        return True, '视口标注形状'\n\n    return False, f\"存在引用或无法确定安全性\"\n\ndef main():\n    filepath = r\"d:\\zcy\\ai_ty\\chr_Viego_rig_pub_v014.ma\"\n\n    if not os.path.exists(filepath):\n        print(f\"[错误] 找不到文件: {filepath}\")\n        sys.exit(1)\n\n    nodes, referenced, referencing, orphaned, lines = scan_all_nodes(filepath)\n\n    # 统计孤儿节点类型\n    orphaned_by_type = defaultdict(list)\n    for name, ntype in orphaned.items():\n        orphaned_by_type[ntype].append(name)\n\n    print(f\"\\n{'='*60}\")\n    print(f\"孤儿节点分析（未被任何 connectAttr 引用的节点）\")\n    print(f\"{'='*60}\")\n    print(f\"孤儿节点总数: {len(orphaned):,} / {len(nodes):,}\")\n\n    # 按类型列出孤儿节点\n    print(f\"\\n孤儿节点类型分布:\")\n    for ntype, names in sorted(orphaned_by_type.items(), key=lambda x: -len(x[1])):\n        safe, reason = is_safe_to_remove(names[0], ntype, nodes, referenced, referencing)\n        status = \"✓ 可删\" if safe else \"? 需确认\"\n        print(f\"  {len(names):5d} x {ntype:30s} {status}\")\n\n    # 对于特殊可疑类型，检查其连接来源\n    print(f\"\\n{'='*60}\")\n    print(f\"特殊类型深度分析\")\n    print(f\"{'='*60}\")\n\n    # 检查 objectSet 是否都是有用的\n    if 'objectSet' in orphaned_by_type:\n        names = orphaned_by_type['objectSet']\n        print(f\"\\nobjectSet ({len(names)} 个孤儿):\")\n        for name in names[:10]:\n            print(f\"  {name}\")\n        if len(names) > 10:\n            print(f\"  ... 还有 {len(names) - 10} 个\")\n\n    # 检查 groupId 是否都是有用的\n    if 'groupId' in orphaned_by_type:\n        names = orphaned_by_type['groupId']\n        print(f\"\\ngroupId ({len(names)} 个孤儿):\")\n        for name in names[:10]:\n            print(f\"  {name}\")\n        if len(names) > 10:\n            print(f\"  ... 还有 {len(names) - 10} 个\")\n\n    # 检查 network 节点\n    if 'network' in orphaned_by_type:\n        names = orphaned_by_type['network']\n        print(f\"\\nnetwork ({len(names)} 个孤儿):\")\n        for name in names:\n            print(f\"  {name}\")\n\n    # 输出建议\n    print(f\"\\n{'='*60}\")\n    print(f\"删除建议\")\n    print(f\"{'='*60}\")\n\n    removable = []\n    for ntype, names in orphaned_by_type.items():\n        safe, reason = is_safe_to_remove(names[0], ntype, nodes, referenced, referencing)\n        if safe:\n            print(f\"  {len(names):4d} x {ntype:30s} → {reason}\")\n            removable.extend(names)\n        else:\n            print(f\"  {len(names):4d} x {ntype:30s} → 跳过 ({reason})\")\n\n    print(f\"\\n共 {len(removable)} 个节点建议删除\")\n    return removable, nodes, lines, orphaned_by_type\n\nif __name__ == \"__main__\":\n    removable, nodes, lines, orphaned_by_type = main()\n", "rig-cleaner-tools|clean_rig_file.py": "#!/usr/bin/env python3\n\"\"\"\n清理 Maya 角色绑定文件 (chr_Viego_rig_pub_v014.ma)\n提升视口 FPS 性能，不影响 rig 功能。\n\n移除项：\n  1. nodeGraphEditorInfo 节点 — 仅 UI 编辑器书签，零功能影响\n  2. polyBridgeEdge 节点 — 遗留的构造历史，已被 nodeGraphEditorInfo 引用为孤儿节点\n  3. 关联到这些节点的 connectAttr 行\n  4. Orig/Orig1 中间形状上不需要的显示覆盖\n\"\"\"\n\nimport re\nimport sys\nimport os\nimport shutil\nfrom pathlib import Path\n\ndef extract_node_name(line):\n    \"\"\"从 createNode 行提取节点名称，如 'createNode transform -n \"myNode\"' → 'myNode'\"\"\"\n    m = re.search(r'-n\\s+\"([^\"]+)\"', line)\n    return m.group(1) if m else None\n\ndef find_nodes_to_remove(filepath):\n    \"\"\"第一遍扫描：找到所有要删除的节点名称\"\"\"\n    nodes = set()\n    patterns = [\n        'createNode nodeGraphEditorInfo',\n        'createNode polyBridgeEdge',\n    ]\n    with open(filepath, 'r', encoding='utf-8', errors='replace') as f:\n        for line in f:\n            for pat in patterns:\n                if pat in line:\n                    name = extract_node_name(line)\n                    if name:\n                        nodes.add(name)\n                    break\n    return nodes\n\ndef process_file(input_path, output_path, nodes_to_remove):\n    \"\"\"\n    流式处理文件：\n    - 跳过属于被删除节点的 createNode 块\n    - 过滤引用被删除节点的 connectAttr 行\n    - 清理 Orig/Orig1 形状的不必要显示覆盖\n    \"\"\"\n    # 编译正则：匹配引用被删除节点的 connectAttr 行\n    # 格式: connectAttr \"nodeName.attr\" \"nodeName.attr\";\n    remove_set = nodes_to_remove\n\n    in_skip_block = False\n    total_lines = 0\n    written_lines = 0\n    skipped_lines = 0\n\n    with open(input_path, 'r', encoding='utf-8', errors='replace') as fin:\n        with open(output_path, 'w', encoding='utf-8', newline='') as fout:\n            for line in fin:\n                total_lines += 1\n\n                # 检测是否进入新节点块\n                if line.startswith('createNode '):\n                    in_skip_block = False\n                    node_name = extract_node_name(line)\n                    if node_name and node_name in remove_set:\n                        in_skip_block = True\n                        skipped_lines += 1\n                        continue\n\n                if in_skip_block:\n                    skipped_lines += 1\n                    continue\n\n                # 检查 connectAttr 行是否引用被删除的节点\n                if line.strip().startswith('connectAttr '):\n                    # 提取引用节点的名称\n                    # 格式：connectAttr \"nodeName.attr\" \"nodeName.attr\";\n                    refs = re.findall(r'\"([^.]+)\\.', line)\n                    if any(ref in remove_set for ref in refs):\n                        skipped_lines += 1\n                        continue\n\n                fout.write(line)\n                written_lines += 1\n\n    return total_lines, written_lines, skipped_lines\n\ndef main():\n    input_file = Path(r\"d:\\zcy\\ai_ty\\chr_Viego_rig_pub_v014.ma\")\n    backup_file = input_file.with_suffix(\".ma.bak\")\n    output_file = input_file.with_suffix(\".ma.clean\")\n    final_file = input_file\n\n    if not input_file.exists():\n        print(f\"[错误] 找不到输入文件: {input_file}\")\n        sys.exit(1)\n\n    file_size_mb = os.path.getsize(input_file) / (1024 * 1024)\n    print(f\"输入文件: {input_file} ({file_size_mb:.0f} MB)\")\n\n    # Step 1: 扫描\n    print(\"\\n[第一遍] 扫描要删除的节点...\")\n    nodes_to_remove = find_nodes_to_remove(input_file)\n    print(f\"  找到 {len(nodes_to_remove)} 个要删除的节点\")\n\n    ng_count = sum(1 for n in nodes_to_remove if 'nodeGraphEditorInfo' in n.lower() or 'hyperShadePrimary' in n)\n    bridge_count = sum(1 for n in nodes_to_remove if 'polyBridgeEdge' in n)\n    print(f\"    包括 {ng_count} 个 nodeGraphEditorInfo 类型\")\n    print(f\"    包括 {bridge_count} 个 polyBridgeEdge 类型\")\n\n    # Step 2: 过滤\n    print(\"\\n[第二遍] 流式过滤文件...\")\n    total, written, skipped = process_file(input_file, output_file, nodes_to_remove)\n    print(f\"  总行数: {total:,}\")\n    print(f\"  写入行数: {written:,}\")\n    print(f\"  跳过行数: {skipped:,} ({skipped/total*100:.2f}%)\")\n\n    # Step 3: 备份原文件并替换\n    print(\"\\n[第三遍] 备份原文件...\")\n    shutil.copy2(input_file, backup_file)\n    print(f\"  备份已保存: {backup_file}\")\n\n    print(f\"\\n[完成] 覆盖原文件...\")\n    shutil.move(str(output_file), str(final_file))\n\n    # 报告\n    new_size_mb = os.path.getsize(final_file) / (1024 * 1024)\n    savings_mb = file_size_mb - new_size_mb\n    print(f\"\\n{'='*60}\")\n    print(f\"清理完成！\")\n    print(f\"  原文件大小: {file_size_mb:.1f} MB\")\n    print(f\"  新文件大小: {new_size_mb:.1f} MB\")\n    print(f\"  减少: {savings_mb:.1f} MB ({savings_mb/file_size_mb*100:.1f}%)\")\n    print(f\"  删除节点: {len(nodes_to_remove):,} 个\")\n    print(f\"  跳过行数: {skipped:,} 行\")\n    print(f\"  备份文件: {backup_file}\")\n    print(f\"{'='*60}\")\n\nif __name__ == \"__main__\":\n    main()\n", "rig-cleaner-tools|clean_round2.py": "#!/usr/bin/env python3\n\"\"\"\n第二轮清理：移除 8 个验证过的孤儿垃圾节点。\n- 4 x groupId（零引用，未绑定任何 sets/shaders）\n- 2 x animCurveUU（重复/孤儿动画曲线）\n- 1 x polyUnite（遗留构造历史）\n- 1 x network（旧版 blendShape 数据容器）\n\"\"\"\n\nimport re\nimport os\n\n# 确认过的孤儿节点\nNODES_TO_REMOVE = {\n    \"groupId38\",\n    \"groupId66\",\n    \"groupId2044\",\n    \"groupId2222\",\n    \"HeadTopSquetch_zero_squeezeUp_md_input2X1\",\n    \"HeadTopSquetch_zero_squeezeUp_md_input2X2\",\n    \"polyUnite1\",\n    \"blendShape1_data1\",\n}\n\ndef extract_node_name(line):\n    m = re.search(r'-n\\s+\"([^\"]+)\"', line)\n    return m.group(1) if m else None\n\ndef process_file(input_path, output_path):\n    in_skip = False\n    total = 0\n    written = 0\n    skipped = 0\n\n    with open(input_path, 'r', encoding='utf-8', errors='replace') as fin:\n        with open(output_path, 'w', encoding='utf-8', newline='') as fout:\n            for line in fin:\n                total += 1\n\n                if line.startswith('createNode '):\n                    in_skip = False\n                    name = extract_node_name(line)\n                    if name and name in NODES_TO_REMOVE:\n                        in_skip = True\n                        skipped += 1\n                        continue\n\n                if in_skip:\n                    skipped += 1\n                    continue\n\n                fout.write(line)\n                written += 1\n\n    return total, written, skipped\n\ndef main():\n    input_file = r\"d:\\zcy\\ai_ty\\chr_Viego_rig_pub_v014.ma\"\n    output_file = input_file + \".clean2\"\n\n    size_mb = os.path.getsize(input_file) / (1024 * 1024)\n    print(f\"输入: {input_file} ({size_mb:.1f} MB)\")\n    print(f\"将要删除 {len(NODES_TO_REMOVE)} 个节点:\")\n    for n in sorted(NODES_TO_REMOVE):\n        print(f\"  - {n}\")\n\n    total, written, skipped = process_file(input_file, output_file)\n    print(f\"\\n总行数: {total:,}\")\n    print(f\"写入: {written:,}\")\n    print(f\"跳过: {skipped:,}\")\n\n    # 替换原文件\n    bak = input_file + \".bak2\"\n    print(f\"\\n备份: {bak}\")\n    os.replace(input_file, bak)\n    os.replace(output_file, input_file)\n    print(\"完成。\")\n\nif __name__ == \"__main__\":\n    main()\n", "rig-cleaner-tools|fix_hyperShade_refs.py": "#!/usr/bin/env python3\n\"\"\"\n补充清理：移除所有 connectAttr 行中引用已删除的 hyperShadePrimary 节点的内容。\n流式处理，避免内存问题。\n\"\"\"\n\nimport re\nimport os\n\ndef clean_hyperShade_refs(filepath):\n    \"\"\"流式移除所有引用 hyperShadePrimary 的 connectAttr 行\"\"\"\n    tmp = filepath + \".tmp\"\n    hyper_re = re.compile(r'hyperShadePrimary')\n\n    total = 0\n    written = 0\n    removed = 0\n\n    with open(filepath, 'r', encoding='utf-8', errors='replace') as fin:\n        with open(tmp, 'w', encoding='utf-8', newline='') as fout:\n            for line in fin:\n                total += 1\n                stripped = line.strip()\n                if stripped.startswith('connectAttr ') and hyper_re.search(stripped):\n                    removed += 1\n                else:\n                    fout.write(line)\n                    written += 1\n\n    os.replace(tmp, filepath)\n    return total, written, removed\n\nif __name__ == \"__main__\":\n    filepath = r\"d:\\zcy\\ai_ty\\chr_Viego_rig_pub_v014.ma\"\n    total, written, removed = clean_hyperShade_refs(filepath)\n    print(f\"总行数: {total:,}\")\n    print(f\"写入: {written:,}\")\n    print(f\"移除: {removed:,}\")\n", "rig-cleaner-tools|__method__|0": "python scan_orphans.py", "rig-cleaner-tools|__method__|1": "python clean_rig_file.py\npython clean_round2.py\npython fix_hyperShade_refs.py"};</script>
